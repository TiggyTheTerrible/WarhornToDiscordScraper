name: Warhorn to Discord
on:
  schedule:
    - cron: "*/15 * * * *" # Every 15 minutes
  workflow_dispatch: # Allows manual runs

permissions:
  contents: write   # Required for the commit + push step with GITHUB_TOKEN

jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v7
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run the script
        env:
          RSS_FEED_1: ${{ secrets.RSS_FEED_1 }}
          DISCORD_WEBHOOK_LONG_REST: ${{ secrets.DISCORD_WEBHOOK_LONG_REST }}
          ROLE_ID_LONG_REST: ${{ secrets.ROLE_ID_LONG_REST }}
          # NEW WEBHOOKS HERE!
          DISCORD_WEBHOOK_DEFAULT: ${{ secrets.DISCORD_WEBHOOK_DEFAULT }}
        run: python main.py

      - name: Commit updated seen list
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add seen_warhorn.json || true
          git diff --quiet && git diff --staged --quiet || (git commit -m "Update seen Warhorn links" && git push)
