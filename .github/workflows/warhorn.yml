name: Warhorn to Discord

on:
  schedule:
    - cron: "*/30 * * * *"   # Every 30 minutes
  workflow_dispatch:         # Allows manual runs

jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v7
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run the script
        env:
          RSS_FEED_1: ${{ secrets.RSS_FEED_1 }}

          DISCORD_WEBHOOK_BOARD_HOME: ${{ secrets.DISCORD_WEBHOOK_BOARD_HOME }}
          ROLE_ID_BOARD_AT_HOME: ${{ secrets.ROLE_ID_BOARD_AT_HOME }}

          DISCORD_WEBHOOK_CHAOS_CARDS: ${{ secrets.DISCORD_WEBHOOK_CHAOS_CARDS }}
          ROLE_ID_CHAOS_CARDS: ${{ secrets.ROLE_ID_CHAOS_CARDS }}
          
          DISCORD_WEBHOOK_DICE_N_DESTINY: ${{ secrets.DISCORD_WEBHOOK_DICE_N_DESTINY }}
          ROLE_ID_DICE_N_DESTINY: ${{ secrets.ROLE_ID_DICE_N_DESTINY }}
          
          DISCORD_WEBHOOK_LONG_REST: ${{ secrets.DISCORD_WEBHOOK_LONG_REST }}
          ROLE_ID_LONG_REST: ${{ secrets.ROLE_ID_LONG_REST }}

          DISCORD_WEBHOOK_MUG_MEEPLE: ${{ secrets.DISCORD_WEBHOOK_MUG_MEEPLE }}
          ROLE_ID_MUG_MEEPLE: ${{ secrets.ROLE_ID_MUG_MEEPLE }}
          
          DISCORD_WEBHOOK_DEFAULT: ${{ secrets.DISCORD_WEBHOOK_DEFAULT }}
        run: |
          echo "========================================"
          echo "Warhorn → Discord check started"
          echo "Time: $(date -u)"
          echo "========================================"
          python main.py
          echo "========================================"
          echo "Script finished"
          echo "========================================"

      - name: Commit updated seen list
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add seen_warhorn.json || true
          git diff --quiet && git diff --staged --quiet || (git commit -m "Update seen Warhorn links" && git push)
